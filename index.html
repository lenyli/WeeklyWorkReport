<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#155e75" />
    <title>智慧云影研发部工作周报</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>智慧云影研发部工作周报</h1>
      </div>
      <div id="accountBar" class="account-bar hidden">
        <strong id="accountName"></strong>
        <button id="changePasswordBtn" class="ghost" type="button">修改密码</button>
        <button id="logoutBtn" class="ghost" type="button">退出</button>
      </div>
    </header>

    <main>
      <aside class="demo-notice" aria-label="演示版说明">
        当前为本地数据库演示版：页面可以在不同设备打开，但账号、密码和周报数据不会跨设备同步。
      </aside>
      <section id="loginPanel" class="panel" aria-labelledby="loginTitle">
        <div class="section-head">
          <h2 id="loginTitle">进入周报</h2>
        </div>
        <form id="loginForm" class="login-row">
          <label>
            姓名
            <input id="nameInput" autocomplete="name" required />
          </label>
          <label>
            密码
            <input id="passwordInput" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="current-password" required />
          </label>
          <button type="submit">进入</button>
        </form>
        <p class="status">填写姓名</p>
        <p id="loginStatus" class="status" aria-live="polite"></p>
      </section>

      <section id="reportPanel" class="panel hidden" aria-labelledby="reportTitle">
        <div class="section-head">
          <h2 id="reportTitle">我的周报</h2>
          <button id="memberHelpBtn" class="secondary" type="button">使用说明</button>
        </div>

        <div class="toolbar">
          <label>
            周一日期
            <input id="reportWeekStart" type="date" />
          </label>
        </div>
        <p id="reportStatus" class="status" aria-live="polite"></p>
        <div id="reportTableWrap" class="table-wrap"></div>
        <div class="bottom-actions">
          <button id="saveDraftBtn" class="secondary" type="button">保存草稿</button>
          <button id="clearBtn" class="secondary" type="button">清空</button>
          <button id="submitBtn" type="button">提交周报</button>
          <button id="downloadBackupBtn" class="secondary" type="button">下载个人 Excel</button>
        </div>
      </section>

      <section id="collectorPanel" class="panel hidden" aria-labelledby="collectorTitle">
        <div class="section-head">
          <h2 id="collectorTitle">收集汇总</h2>
          <button id="leaderHelpBtn" class="secondary" type="button">使用说明</button>
        </div>

        <div class="toolbar">
          <label>
            汇总周一日期
            <input id="collectorWeekStart" type="date" />
          </label>
          <button id="exportExcelBtn" type="button">导出 Excel</button>
          <label class="file-picker">
            上传成员 Excel
            <input id="reportFilesInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple />
          </label>
        </div>

        <div class="leader-grid">
          <section class="subpanel" aria-labelledby="rosterTitle">
            <div class="section-head compact">
              <h3 id="rosterTitle">成员名单 <span id="rosterCount"></span></h3>
            </div>
            <div id="rosterList" class="list"></div>
          </section>

          <section class="subpanel" aria-labelledby="collectorStatusTitle">
            <div class="section-head compact">
              <h3 id="collectorStatusTitle">提交情况</h3>
            </div>
            <div id="collectorStatus" class="status-block"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog id="helpDialog" class="help-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h3 id="helpTitle">使用说明</h3>
          <button class="ghost" value="close" type="submit">关闭</button>
        </div>
        <div id="helpBody" class="help-body"></div>
      </form>
    </dialog>

    <dialog id="passwordDialog" class="help-dialog">
      <form id="changePasswordForm">
        <div class="dialog-head">
          <h3>修改密码</h3>
          <button id="closePasswordDialog" class="ghost" type="button">关闭</button>
        </div>
        <label>原密码<input id="oldPasswordInput" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required /></label>
        <label>新密码<input id="newPasswordInput" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required /></label>
        <label>确认新密码<input id="confirmPasswordInput" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required /></label>
        <p id="passwordStatus" class="status" aria-live="polite"></p>
        <button type="submit">确认修改</button>
      </form>
    </dialog>

    <template id="rowTemplate">
      <tr>
        <th scope="row"></th>
        <td><textarea data-field="dev" aria-label="开发/测试/需求"></textarea></td>
        <td><textarea data-field="site" aria-label="场地支持"></textarea></td>
        <td><textarea data-field="presales" aria-label="售前支持"></textarea></td>
        <td><textarea data-field="other" aria-label="其他"></textarea></td>
      </tr>
    </template>

    <script src="db.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
