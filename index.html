<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#155e75" />
    <title>智慧云影研发部工作周报</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>智慧云影研发部工作周报</h1>
      </div>
      <div id="accountBar" class="account-bar hidden">
        <strong id="accountName"></strong>
        <button id="logoutBtn" class="ghost" type="button">退出换人</button>
      </div>
    </header>

    <main>
      <section id="loginPanel" class="panel" aria-labelledby="loginTitle">
        <div class="section-head">
          <div>
            <h2 id="loginTitle">进入周报</h2>
          </div>
        </div>
        <form id="loginForm" class="login-row">
          <label>
            姓名
            <input id="nameInput" autocomplete="name" required />
          </label>
          <button type="submit">进入</button>
        </form>
        <p id="loginStatus" class="status" aria-live="polite"></p>
      </section>

      <section id="reportPanel" class="panel hidden" aria-labelledby="reportTitle">
        <div class="section-head">
          <div>
            <h2 id="reportTitle">我的周报</h2>
          </div>
          <div class="action-group">
            <button id="shareReportBtn" type="button">分享周报</button>
            <button id="downloadBackupBtn" class="secondary" type="button">下载个人 Excel</button>
          </div>
        </div>

        <div class="toolbar">
          <label>
            周一日期
            <input id="reportWeekStart" type="date" />
          </label>
          <button id="saveDraftBtn" class="secondary" type="button">保存草稿</button>
          <button id="submitBtn" type="button">提交</button>
        </div>
        <p id="reportStatus" class="status" aria-live="polite"></p>
        <div id="reportTableWrap" class="table-wrap"></div>
      </section>

      <section id="collectorPanel" class="panel hidden" aria-labelledby="collectorTitle">
        <div class="section-head">
          <div>
            <h2 id="collectorTitle">收集汇总</h2>
          </div>
          <button id="refreshCollectorBtn" class="secondary" type="button">刷新</button>
        </div>

        <div class="toolbar">
          <label>
            汇总周一日期
            <input id="collectorWeekStart" type="date" />
          </label>
          <button id="exportExcelBtn" type="button">导出 Excel</button>
          <label class="file-picker">
            上传成员 Excel
            <input id="reportFilesInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple />
          </label>
        </div>

        <div class="leader-grid">
          <section class="subpanel" aria-labelledby="rosterTitle">
            <div class="section-head compact">
              <h3 id="rosterTitle">成员名单 <span id="rosterCount"></span></h3>
            </div>
            <form id="addMemberForm" class="add-row">
              <input id="memberNameToAdd" placeholder="添加成员姓名" />
              <button type="submit" class="secondary">添加</button>
            </form>
            <div id="rosterList" class="list"></div>
          </section>

          <section class="subpanel" aria-labelledby="collectorStatusTitle">
            <div class="section-head compact">
              <h3 id="collectorStatusTitle">提交情况</h3>
            </div>
            <div id="collectorStatus" class="status-block"></div>
          </section>
        </div>
      </section>

      <section id="rootPanel" class="panel hidden" aria-labelledby="rootTitle">
        <div class="section-head">
          <div>
            <h2 id="rootTitle">最高权限</h2>
          </div>
          <button id="refreshRootBtn" class="secondary" type="button">刷新</button>
        </div>

        <div class="toolbar">
          <label>
            查看周一日期
            <input id="rootWeekStart" type="date" />
          </label>
          <button id="rootExportExcelBtn" type="button">导出本周汇总 Excel</button>
          <label class="file-picker">
            上传成员 Excel
            <input id="rootReportFilesInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple />
          </label>
        </div>

        <div class="root-grid">
          <section class="subpanel" aria-labelledby="rootSummaryTitle">
            <h3 id="rootSummaryTitle">汇总预览</h3>
            <div id="rootSummary" class="status-block"></div>
          </section>
          <section class="subpanel" aria-labelledby="loginTimesTitle">
            <h3 id="loginTimesTitle">最后登录时间</h3>
            <div id="loginTimes" class="list"></div>
          </section>
        </div>

        <section class="subpanel reports-panel" aria-labelledby="allReportsTitle">
          <h3 id="allReportsTitle">全部报告</h3>
          <div id="allReports" class="reports-list"></div>
        </section>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <th scope="row"></th>
        <td><textarea data-field="dev" aria-label="开发/测试/需求"></textarea></td>
        <td><textarea data-field="site" aria-label="场地支持"></textarea></td>
        <td><textarea data-field="presales" aria-label="售前支持"></textarea></td>
        <td><textarea data-field="other" aria-label="其他"></textarea></td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
